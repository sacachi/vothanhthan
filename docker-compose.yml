services:
  web:
    build: .
    expose:
      - "3000"
    environment:
      DATABASE_URL: file:/data/db.sqlite
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
    volumes:
      - db_data:/data                 # SQLite database
      - uploads:/app/public/uploads   # User-uploaded images
    restart: unless-stopped

volumes:
  db_data:
  uploads:
